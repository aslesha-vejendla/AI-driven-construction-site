<!DOCTYPE html>
<html lang="en">
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ConstructionEase — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ─────────────────────────────────────────────── */
:root {
  --navy-950: #03080F;
  --navy-900: #060E1D;
  --navy-800: #0A1628;
  --navy-700: #0F2040;
  --navy-600: #152B58;
  --navy-500: #1D3A72;
  --navy-400: #2A5298;
  --navy-300: #4472C4;
  --navy-200: #7AAEE8;
  --navy-100: #C2D9F5;
  --navy-50 : #EBF4FD;
  --font-d: 'Fraunces', Georgia, serif;
  --font-b: 'DM Sans', sans-serif;
  --font-m: 'JetBrains Mono', monospace;
  --green: #22C55E;
  --bg: #F4F8FF;
  --surface: #FFFFFF;
  --surface2: #F4F7FF;
  --border: #D4E6FF;
  --text: #0F1419;
  --text3: #2A3A5C;
}

/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }

/* ══════════════════════════════════════════════════════════
   SHELL — centered split layout
══════════════════════════════════════════════════════════ */
.shell {
  display: flex;
  width: 100%;
  max-width: 1000px;
  height: 600px;
  position: relative;
  overflow: hidden;
  margin: 50px auto;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}

/* ── Halves ─────────────────────────────────────────────── */
.half {
  position: relative;
  width: 50%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 52px 44px;
  cursor: default;
  transition: width .6s cubic-bezier(.77, 0, .18, 1),
              opacity .45s ease;
  overflow: hidden;
}
.half.sup { background: var(--surface); border-right: 2px solid var(--border); }
.half.wor { background: var(--surface2); }

/* Dot-grid texture */
.half::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: 0;
  transition: opacity .5s;
  pointer-events: none;
}

/* Radial accent glow */
.half::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 65% 55% at 50% 35%,
    rgba(68,114,196,.13) 0%, transparent 70%);
  opacity: 0;
  transition: opacity .55s;
  pointer-events: none;
}

/* ── Hover expand/shrink ─────────────────────────────────── */
.shell:has(.sup:hover) .sup,
.shell:has(.sup.selected) .sup,
.shell.sa .sup { width: 64%; }
.shell:has(.sup:hover) .wor,
.shell:has(.sup.selected) .wor,
.shell.sa .wor { width: 36%; opacity: .38; }

.shell:has(.wor:hover) .wor,
.shell:has(.wor.selected) .wor,
.shell.wa .wor { width: 64%; }
.shell:has(.wor:hover) .sup,
.shell:has(.wor.selected) .sup,
.shell.wa .sup { width: 36%; opacity: .38; }

.shell:has(.sup:hover) .sup::before,
.shell:has(.sup.selected) .sup::before,
.shell:has(.wor:hover) .wor::before,
.shell:has(.wor.selected) .wor::before,
.shell.sa .sup::before,
.shell.wa .wor::before { opacity: 1; }

.shell:has(.sup:hover) .sup::after,
.shell:has(.sup.selected) .sup::after,
.shell:has(.wor:hover) .wor::after,
.shell:has(.wor.selected) .wor::after,
.shell.sa .sup::after,
.shell.wa .wor::after { opacity: 1; }

/* ── Centre divider ─────────────────────────────────────── */
.divider {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
  transition: opacity .35s;
}
.shell:has(.sup:hover) .divider,
.shell:has(.sup.selected) .divider,
.shell:has(.wor:hover) .divider,
.shell:has(.wor.selected) .divider,
.shell.sa .divider, .shell.wa .divider { opacity: 0; }
.div-line { width: 1px; height: 96px; background: #DCEAFF; }
.div-or {
  font-family: var(--font-m);
  font-size: 9.5px; color: var(--navy-400);
  letter-spacing: 2px; text-transform: uppercase;
  padding: 9px 0;
}

/* ── Brand watermark ─────────────────────────────────────── */
.brand {
  position: absolute;
  top: 26px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  text-align: center;
  pointer-events: none;
}
.brand-name {
  font-family: var(--font-d);
  font-size: 17px; font-weight: 700;
  color: var(--navy-700);
  letter-spacing: -.4px;
}
.brand-name em { color: var(--navy-400); font-style: normal; }
.brand-tag {
  font-family: var(--font-m);
  font-size: 8.5px; color: var(--navy-400);
  letter-spacing: 2.5px; text-transform: uppercase;
  margin-top: 3px;
}

/* ── Role identity ───────────────────────────────────────── */
.role-icon {
  width: 50px; height: 50px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  transition: background .3s, border-color .3s;
}
.half:hover .role-icon,
.half.selected .role-icon,
.shell.sa .sup .role-icon,
.shell.wa .wor .role-icon {
  background: var(--navy-50);
  border-color: var(--navy-200);
}
.role-icon svg {
  width: 24px; height: 24px;
  stroke: var(--navy-400); fill: none; stroke-width: 1.6;
}

.role-title {
  font-family: var(--font-d);
  font-size: clamp(30px, 3.5vw, 48px);
  font-weight: 700;
  color: var(--navy-700);
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 7px;
  text-align: center;
}
.role-sub {
  font-family: var(--font-m);
  font-size: 10px; color: var(--navy-400);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 34px; text-align: center;
  transition: opacity .3s;
}

/* ── Form card ───────────────────────────────────────────── */
.form-card {
  width: 100%; max-width: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 26px 24px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  /* Hidden by default */
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
  transition: opacity .38s ease .08s, transform .38s ease .08s;
}

/* Show when its half is hovered or selected */
.half.sup:hover .form-card,
.half.sup.selected .form-card,
.shell.sa .sup .form-card { opacity: 1; transform: none; pointer-events: all; }
.half.wor:hover .form-card,
.half.wor.selected .form-card,
.shell.wa .wor .form-card { opacity: 1; transform: none; pointer-events: all; }

/* Hide when OTHER half is hovered or selected */
.shell:has(.sup:hover) .wor .form-card,
.shell:has(.sup.selected) .wor .form-card,
.shell.sa .wor .form-card { opacity: 0; pointer-events: none; }
.shell:has(.wor:hover) .sup .form-card,
.shell:has(.wor.selected) .sup .form-card,
.shell.wa .sup .form-card { opacity: 0; pointer-events: none; }

/* ── Form elements ───────────────────────────────────────── */
.fc-head { margin-bottom: 20px; }
.fc-title {
  font-family: var(--font-d);
  font-size: 18px; font-weight: 600;
  color: var(--navy-700); letter-spacing: -.3px; margin-bottom: 3px;
}
.fc-sub { font-family: var(--font-m); font-size: 11px; color: var(--navy-400); }

.fc-error {
  background: rgba(220,38,38,.14);
  border: 1px solid rgba(220,38,38,.3);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 12px; color: #FCA5A5;
  font-family: var(--font-m);
  margin-bottom: 14px;
  display: none;
}
.fc-error.show { display: block; }

.fc-field { margin-bottom: 13px; }
.fc-label {
  display: block;
  font-family: var(--font-m);
  font-size: 9.5px; color: var(--navy-400);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.fc-input {
  width: 100%;
  background: #FFFFFF;
  border: 1.5px solid #DCEAFF;
  border-radius: 8px;
  padding: 10px 13px;
  color: var(--navy-700);
  font-size: 14px; font-family: var(--font-b);
  outline: none;
  transition: border-color .15s, background .15s;
  box-sizing: border-box;
}
.fc-input:focus {
  border-color: var(--navy-400);
  background: #F9FBFF;
}
.fc-input::placeholder { color: var(--text4); }

.fc-btn {
  width: 100%; padding: 11px;
  background: var(--navy-400); color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; font-family: var(--font-b);
  cursor: pointer; margin-top: 4px;
  transition: background .15s, transform .15s, box-shadow .15s;
  letter-spacing: .2px;
}
.fc-btn:hover {
  background: var(--navy-300);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(22, 76, 170, 0.35);
}

/* Footer text */
.fc-foot {
  text-align: center;
  margin-top: 18px;
  font-family: var(--font-b);
  font-size: 14px;
  color: var(--navy-600); /* clean readable */
  letter-spacing: 0.2px;
}

/* Register link */
.fc-foot a {
  color: var(--navy-400);
  font-weight: 800;                 /* 🔥 bold premium */
  font-family: var(--font-d);       /* 🔥 elegant serif */
  letter-spacing: 0.4px;
  text-decoration: underline;
  text-underline-offset: 4px;
  transition: all 0.2s ease;
}

/* Hover effect */
.fc-foot a:hover {
  color: var(--navy-300);
  transform: translateY(-1px);
}

/* ── Hint ────────────────────────────────────────────────── */
.hint {
  position: absolute; bottom: 26px;
  font-family: var(--font-m);
  font-size: 9.5px; color: rgba(255,255,255,.18);
  letter-spacing: 1.8px; text-transform: uppercase;
  animation: hintPulse 2.6s infinite;
  transition: opacity .3s;
}
@keyframes hintPulse {
  0%, 100% { opacity: .18; }
  50% { opacity: .42; }
}
.shell:has(.sup:hover) .hint,
.shell:has(.sup.selected) .hint,
.shell:has(.wor:hover) .hint,
.shell:has(.wor.selected) .hint,
.shell.sa .hint, .shell.wa .hint { opacity: 0 !important; animation: none; }

/* ── Mobile ──────────────────────────────────────────────── */
@media (max-width: 640px) {
  body { overflow-y: auto; min-height: 100vh; height: auto; }
  .shell { flex-direction: column; height: auto; min-height: 600px; margin: 20px auto; }
  .half { width: 100% !important; opacity: 1 !important; padding: 44px 24px; cursor: default; }
  .half.sup { border-right: none; border-bottom: 1px solid rgba(255,255,255,.07); }
  .form-card {
    opacity: 1 !important; transform: none !important;
    pointer-events: all !important;
  }
  .divider, .brand, .hint { display: none; }
}
</style>
</head>
<body>

<div class="shell" id="shell">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-name">Construction<em>.</em>Ease</div>
    <div class="brand-tag">Site Intelligence Platform</div>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="div-line"></div>
    <div class="div-or">or</div>
    <div class="div-line"></div>
  </div>

  <!-- ══════ SUPERVISOR HALF ══════ -->
  <div class="half sup" id="supHalf">

    <div class="role-icon">
      <!-- Supervisor icon -->
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="7" r="4"/>
        <path d="M4 21v-1a8 8 0 0 1 16 0v1"/>
        <path d="M15 3.5A4 4 0 0 1 16 7"/>
        <path d="M20 21v-1a8 8 0 0 0-4-6.93"/>
      </svg>
    </div>
    <div class="role-title">Supervisor</div>
    <div class="role-sub">Full site command &amp; analytics</div>

    <div class="form-card" onclick="event.stopPropagation()">
      <div class="fc-head">
        <div class="fc-title">Welcome back</div>
        <div class="fc-sub">Signing in as Supervisor</div>
      </div>

      <!-- Match exact backend fields: email, password POST /login -->
      <form action="/login" method="post">
        <div class="fc-field">
          <label class="fc-label">Email</label>
          <input class="fc-input" type="email" name="email"
                 required/>
        </div>
        <div class="fc-field">
          <label class="fc-label">Password</label>
          <input class="fc-input" type="password" name="password"
                 required/>
        </div>
        <button class="fc-btn" type="submit">Sign In</button>
      </form>

      <div class="fc-foot">
        No account? <a href="/register?role=supervisor">Register here</a>
      </div>
    </div>

    <div class="hint">Hover to expand</div>
  </div>

  <!-- ══════ WORKER HALF ══════ -->
  <div class="half wor" id="worHalf">

    <div class="role-icon">
      <!-- Worker / hard hat icon -->
      <svg viewBox="0 0 24 24">
        <path d="M2 18h20"/>
        <path d="M12 2a8 8 0 0 1 8 8H4a8 8 0 0 1 8-8z"/>
        <path d="M12 2v4"/>
        <path d="M6.34 6.34L9.17 9.17"/>
        <path d="M17.66 6.34L14.83 9.17"/>
      </svg>
    </div>
    <div class="role-title">Worker</div>
    <div class="role-sub">Log updates &amp; shift handovers</div>

    <div class="form-card" onclick="event.stopPropagation()">
      <div class="fc-head">
        <div class="fc-title">Welcome back</div>
        <div class="fc-sub">Signing in as Worker</div>
      </div>

      <!-- Same fields — backend auth.py checks role after login -->
      <form action="/login" method="post">
        <div class="fc-field">
          <label class="fc-label">Email</label>
          <input class="fc-input" type="email" name="email"
                 required/>
        </div>
        <div class="fc-field">
          <label class="fc-label">Password</label>
          <input class="fc-input" type="password" name="password"
                 required/>
        </div>
        <button class="fc-btn" type="submit">Sign In</button>
      </form>

      <div class="fc-foot">
        No account? <a href="/register?role=worker">Register here</a>
      </div>
    </div>

    <div class="hint">Hover to expand</div>
  </div>

</div><!-- /shell -->
<script>
// JS fallback for browsers without CSS :has() support
const shell  = document.getElementById('shell');
const supHalf = document.getElementById('supHalf');
const worHalf = document.getElementById('worHalf');

const hasSupport = CSS.supports('selector(:has(a))');
if (!hasSupport) {
  supHalf.addEventListener('mouseenter', () => { shell.classList.add('sa'); shell.classList.remove('wa'); });
  worHalf.addEventListener('mouseenter', () => { shell.classList.add('wa'); shell.classList.remove('sa'); });
  shell.addEventListener('mouseleave', () => { shell.classList.remove('sa', 'wa'); });
}

// Add click to keep expanded
supHalf.addEventListener('click', () => {
  shell.classList.add('sa');
  shell.classList.remove('wa');
  supHalf.classList.add('selected');
  worHalf.classList.remove('selected');
});
worHalf.addEventListener('click', () => {
  shell.classList.add('wa');
  shell.classList.remove('sa');
  worHalf.classList.add('selected');
  supHalf.classList.remove('selected');
});
</script>
</body>
</html>
