<!DOCTYPE html>
<html>
<head>
    <title>👷 Register</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /*  Animated Background */
        .bg-animation {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    background: linear-gradient(120deg, #667eea, #5a67d8, #4c51bf);
}

/* moving soft blobs */
.bg-animation::before,
.bg-animation::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.5;
    animation: floatBlob 18s infinite ease-in-out;
}

.bg-animation::before {
    background: #7f9cf5;
    top: -100px;
    left: -100px;
}

.bg-animation::after {
    background: #9f7aea;
    bottom: -120px;
    right: -120px;
    animation-delay: 6s;
}

/* blob animation */
@keyframes floatBlob {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(80px, -60px) scale(1.2); }
    100% { transform: translate(0,0) scale(1); }
}

        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            width: 380px;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            color: #1a202c;
            background: #f7fafc;
        }

        input::placeholder {
            color: #a0aec0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .link {
            text-align: center;
            margin-top: 12px;
        }

        a {
            color: #667eea;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="bg-animation"></div>

<div class="card">
    <h2 id="title">👷 Register</h2>

    <form action="/register" method="post">
        <input name="name" placeholder="Full Name" required>
        <input name="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>

        <select name="role" id="roleSelect" required>
            <option value="">Select Role</option>
            <option value="worker">Worker</option>
            <option value="supervisor">Supervisor</option>
        </select>

        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        Already registered? <a href="/">Login</a>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const role = params.get("role");

const title = document.getElementById("title");
const roleSelect = document.getElementById("roleSelect");

if (role === "worker") {
    title.innerText = "👷 Worker Register";
    roleSelect.value = "worker";
}

if (role === "supervisor") {
    title.innerText = "🧑‍💼 Supervisor Register";
    roleSelect.value = "supervisor";
}
</script>

<script src="/static/chatbot.js"></script>

</body>
</html>
